name: Deploy to prod

on:
  workflow_dispatch:
    inputs:
      backend_image:
        description: "Backend image tag (full image reference)"
        required: false
      migrations_image:
        description: "Migrations image tag (full image reference)"
        required: false
      apply:
        description: "Apply changes after plan"
        required: false
        default: "true"
  workflow_run:
    workflows: [ "Build and Deploy" ]
    types: [ completed ]

jobs:
  terraform-plan:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      no_changes: ${{ steps.check-changes.outputs.no_changes }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Validate cluster access
        run: |
          kubectl cluster-info
          kubectl get namespace eventme

      - name: Determine deployment values
        id: deploy-vars
        run: |
          backend_image="${{ github.event.inputs.backend_image }}"
          migrations_image="${{ github.event.inputs.migrations_image }}"

          latest_tag_tmp="$(git tag --list | sort -V | tail -n1)"
          echo "latest tag=$latest_tag_tmp"
          
          latest_backend_tag="$latest_tag_tmp"
          latest_migrations_tag="$latest_tag_tmp"-migrations

          if [ -z "$backend_image" ]; then
            backend_image="ghcr.io/rmcampos/event.me:$latest_backend_tag"
          fi
          if [ -z "$migrations_image" ]; then
            migrations_image="ghcr.io/rmcampos/event.me:$latest_migrations_tag"
          fi

          echo "Resolved backend_image=$backend_image"
          echo "Resolved migrations_image=$migrations_image"

          echo "backend_image=$backend_image" >> "$GITHUB_OUTPUT"
          echo "migrations_image=$migrations_image" >> "$GITHUB_OUTPUT"

      - name: Terraform Fmt -check -diff
        working-directory: terraform
        run: terraform fmt -check -diff

      - name: Terraform Init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: check-changes
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          timeout 1m terraform plan -input=false -out=tfplan \
            -var="db_user=${{ secrets.DB_USER }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="db_name=${{ secrets.DB_NAME }}" \
            -var="nextauth_secret=${{ secrets.NEXTAUTH_SECRET }}" \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -var="google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -var="resend_apikey=${{ secrets.RESEND_APIKEY }}" \
            -var="backend_image=${{ steps.deploy-vars.outputs.backend_image }}" \
            -var="migrations_image=${{ steps.deploy-vars.outputs.frontend_image }}"
          terraform show -json tfplan > tfplan.json
          if jq -e '.resource_changes | length == 0' tfplan.json >/dev/null; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "No changes to apply."
            exit 0
          else
            echo "Changes detected. Proceeding with apply"
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_run' || inputs.apply == 'true')
      && needs.terraform-plan.outputs.no_changes == 'false'
    environment:
      name: production
      url: https://eventme.darkroasted.vps-kinghost.net
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Setup Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Terraform Init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: timeout 1m terraform apply tfplan
